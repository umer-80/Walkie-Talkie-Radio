<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P Radio</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>   

<body>    
    <!-- ====== STATUS BAR ====== -->
    <header>
        <div class="status-bar">
            <span class="app-name">P2P RADIO</span>
            <span id="connection-status" class="status-badge offline">OFFLINE</span>
        </div>
    </header>

    <main>
        <!-- ====== RADIO UNIT ====== -->
        <section class="radio-unit">
            <div class="radio-chassis">
                <div class="antenna"></div>
                <div class="radio-body">
                    <div class="speaker-grill">
                        <div class="grill-line"></div>
                        <div class="grill-line"></div>
                        <div class="grill-line"></div>
                        <div class="grill-line"></div>
                        <div class="grill-line"></div>
                    </div>

                    <!-- Display Screen -->
                    <div class="display-screen">
                        <div class="display-top-row">
                            <div class="signal-meter">
                                <div class="meter-bar" id="meter-bar"></div>
                            </div>
                            <div class="led-cluster">
                                <div class="led" id="tx-led">TX</div>
                                <div class="led" id="rx-led">RX</div>
                            </div>
                        </div>
                        <div class="channel-display" id="channel-display">---</div>
                        <div class="status-line" id="status-line">Create or Join a channel</div>
                    </div>

                    <!-- Controls -->
                    <div class="controls">
                        <div class="volume-knob">
                            <div class="knob-dot"></div>
                        </div>
                        <button id="ptt-button" class="ptt-btn" disabled>PTT</button>
                    </div>

                    <div class="branding">P2P RADIO</div>
                </div>
            </div>
        </section>

        <!-- ====== CHANNEL CONTROLS ====== -->
        <section class="channel-section">
            <div class="channel-controls" id="channel-controls">
                <button id="create-btn" class="btn-create">📻 CREATE CHANNEL</button>
                <div class="join-row">
                    <input type="text" id="join-input" class="join-input" placeholder="Enter channel code..."
                        maxlength="12" autocomplete="off" spellcheck="false">
                    <button id="join-btn" class="btn-join">JOIN</button>
                </div>
            </div>

            <!-- Active Channel Info (hidden until connected) -->
            <div class="channel-active" id="channel-active" style="display:none;">
                <div class="active-info">
                    <span class="active-label">CHANNEL:</span>
                    <span class="active-code" id="active-code">---</span>
                </div>
                <div class="active-stats" id="active-stats">TX: 0 | RX: 0 | RTT: ---</div>
                <button id="disconnect-btn" class="btn-disconnect">✕ DISCONNECT</button>
            </div>
        </section>
    </main>

    <!-- ====== SIGNALING SERVER CONFIG ====== -->
    <!-- Change this URL when you deploy the signaling server -->
    <script>
        // Use local IP for Android, but 127.0.0.1 for local web browser to avoid PNA/CORS blocks
        let sigUrl = 'ws://192.168.18.135:3000';
        if (!window.Capacitor) {
            sigUrl = 'ws://127.0.0.1:3000';
        }
        window.SIGNALING_URL = sigUrl;
    </script>
    <script src="main.js"></script>
</body>

</html>
